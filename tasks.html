<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f2f2f7;--card:#fff;--card2:#ececf0;
  --text:#1c1c1e;--text2:#3a3a3c;--muted:#8e8e93;
  --border:rgba(0,0,0,0.09);--r:14px;--sh:0 1px 4px rgba(0,0,0,0.07);
  --accent:#007AFF;--rec:#ff3b30;
  --p1:#EF4444;--p2:#F97316;--p3:#3B82F6;--p4:#9CA3AF;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#000;--card:#1c1c1e;--card2:#2c2c2e;--text:#f2f2f7;--text2:#ebebf5;
    --muted:#636366;--border:rgba(255,255,255,0.1);--sh:0 1px 5px rgba(0,0,0,0.4);}
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;max-width:960px;margin:0 auto;padding-bottom:210px;}

/* Header  */
.hdr{padding:1.1rem 1.25rem 0;position:sticky;top:0;background:var(--bg);z-index:30;}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:.85rem;}
.hdr h1{font-size:26px;font-weight:700;letter-spacing:-.5px;}
.hdr-right{display:flex;align-items:center;gap:8px;}

/* Global timer badge */
.global-timer{
  display:none;align-items:center;gap:6px;
  padding:5px 13px;border-radius:20px;border:none;
  background:var(--rec);color:#fff;font-size:12px;font-weight:600;
  cursor:pointer;font-family:inherit;animation:gpulse 1.2s infinite;
}
@keyframes gpulse{0%,100%{opacity:1}50%{opacity:.75}}
.gt-time{font-variant-numeric:tabular-nums;font-size:13px;}
.gt-name{max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;opacity:.85;font-size:11px;}

.sync-badge{font-size:11px;padding:4px 10px;border-radius:12px;font-weight:500;}
.sync-badge.online{background:#d1f5e0;color:#1a7a3f;}
.sync-badge.offline{background:#fff3cd;color:#856404;}
.sync-badge.error{background:#fde8e8;color:#9b1c1c;}
@media(prefers-color-scheme:dark){
  .sync-badge.online{background:#0d3b20;color:#4ade80;}
  .sync-badge.offline{background:#3d2e00;color:#fbbf24;}
  .sync-badge.error{background:#3b0f0f;color:#f87171;}
}
.icon-btn{width:34px;height:34px;border-radius:50%;border:none;background:var(--card);
  color:var(--muted);font-size:15px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;box-shadow:var(--sh);transition:transform .1s;}
.icon-btn:active{transform:scale(.88);}

/* Tabs */
.tabs{display:flex;flex-wrap:wrap;gap:6px;padding-bottom:.8rem;}
.tab{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);
  font-size:13px;font-weight:500;cursor:pointer;background:var(--card);color:var(--muted);
  white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:5px;}
.tab.active{color:#fff;border-color:transparent;}
.tab-count{background:rgba(255,255,255,.3);border-radius:9px;font-size:11px;padding:1px 5px;font-weight:600;}
.tab:not(.active) .tab-count{background:var(--border);color:var(--muted);}

/* Section header */
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:.3rem 1.25rem .6rem;}
.sec-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.clear-btn{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit;}
.clear-btn:hover{color:#ff3b30;}

/* Task list */
.tasks{padding:0 1rem;display:flex;flex-direction:column;gap:6px;}
.cat-group{margin-bottom:1.25rem;}
.cat-group-hdr{display:flex;align-items:center;gap:8px;padding:0 2px 8px;}
.cat-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.cat-group-label{font-size:13px;font-weight:600;color:var(--text2);}
.cat-group-count{font-size:12px;color:var(--muted);}
.cat-group-tasks{display:flex;flex-direction:column;gap:6px;}

/* Task item */
.task{display:flex;align-items:flex-start;gap:11px;background:var(--card);border-radius:var(--r);
  padding:12px 13px;box-shadow:var(--sh);transition:opacity .2s;
  border-left:3px solid transparent;user-select:none;-webkit-user-select:none;}
.task.done{opacity:.35;}
.task.rec-active{border-left-color:var(--rec);}
.check{width:24px;height:24px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:all .15s;font-size:12px;color:#fff;font-weight:700;margin-top:1px;}
.task.done .check{border-color:transparent;}
.task-body{flex:1;min-width:0;}
.task-lbl{font-size:15px;line-height:1.4;word-break:break-word;}
.task.done .task-lbl{text-decoration:line-through;color:var(--muted);}
.task-meta{display:flex;align-items:center;gap:6px;margin-top:5px;flex-wrap:wrap;}
.task-actions{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;}

/* Priority tags */
.pri-tag{font-size:10px;font-weight:700;padding:2px 6px;border-radius:6px;color:#fff;letter-spacing:.02em;}
.pri-tag.p1{background:var(--p1);}.pri-tag.p2{background:var(--p2);}
.pri-tag.p3{background:var(--p3);}.pri-tag.p4{background:var(--p4);}

/* Jira tag */
.jira-tag{font-size:11px;font-weight:600;padding:2px 7px;border-radius:6px;
  background:#0052CC;color:#fff;text-decoration:none;cursor:default;}
.jira-tag.linked{cursor:pointer;}
.jira-tag.linked:hover{background:#0041A8;}

/* Case tag */
.case-tag{font-size:11px;font-weight:600;padding:2px 7px;border-radius:6px;
  background:#6D28D9;color:#fff;text-decoration:none;cursor:default;
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
.case-tag.linked{cursor:pointer;}
.case-tag.linked:hover{background:#5B21B6;}

.created-lbl{font-size:11px;color:var(--muted);}

/* Due tags */
.due-tag{font-size:11px;padding:2px 8px;border-radius:8px;font-weight:500;cursor:pointer;white-space:nowrap;}
.due-add{color:var(--muted);background:var(--card2);}
.due-overdue{background:#fde8e8;color:#9b1c1c;}
.due-today{background:#fff3cd;color:#7d5a00;}
.due-tomorrow{background:#e8f5e9;color:#1b5e20;}
.due-soon{background:#e3f2fd;color:#0d47a1;}
.due-future{background:var(--card2);color:var(--muted);}
@media(prefers-color-scheme:dark){
  .due-overdue{background:#3b0f0f;color:#f87171;}
  .due-today{background:#3d2e00;color:#fbbf24;}
  .due-tomorrow{background:#0d3b20;color:#4ade80;}
  .due-soon{background:#1e3a5f;color:#93c5fd;}
}

/* Timer on task */
.timer-row{display:flex;align-items:center;gap:8px;margin-top:5px;}
.timer-elapsed{font-size:13px;font-weight:700;color:var(--rec);font-variant-numeric:tabular-nums;}
.timer-total{font-size:11px;color:var(--muted);}
.timer-sessions{font-size:11px;color:var(--muted);}

/* Timer button */
.t-btn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--border);
  font-size:11px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;
  justify-content:center;background:var(--card2);color:var(--muted);
  transition:all .12s;padding:0;}
.t-btn:active{transform:scale(.88);}
.t-btn.on{background:var(--rec);color:#fff;border-color:var(--rec);animation:tpulse .9s infinite;}
@keyframes tpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

.del{background:none;border:none;color:var(--muted);font-size:14px;
  cursor:pointer;padding:4px;border-radius:6px;opacity:0;flex-shrink:0;line-height:1;}
.task:hover .del{opacity:1;}
@media(hover:none){.del{opacity:.35;}}

/* Empty */
.empty{text-align:center;padding:3.5rem 1rem 1.5rem;color:var(--muted);}
.empty-icon{font-size:44px;margin-bottom:.6rem;}
.empty-msg{font-size:15px;line-height:1.7;}

/* Panel */
.panel{position:fixed;bottom:0;left:0;right:0;max-width:960px;margin:0 auto;
  background:var(--card);border-top:1px solid var(--border);padding:.55rem 1rem 1rem;z-index:40;}
.presets-wrap{max-height:0;overflow:hidden;transition:max-height .25s ease;}
.presets-wrap.open{max-height:130px;}
.presets-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;
  -webkit-overflow-scrolling:touch;padding-bottom:8px;}
.presets-scroll::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:6px 13px;border-radius:14px;font-size:13px;
  border:1.5px solid var(--border);background:var(--bg);color:var(--text2);
  cursor:pointer;white-space:nowrap;font-family:inherit;}
.chip:active{transform:scale(.94);}

/* Meta row (priority + jira + case + date) */
.meta-row{display:flex;align-items:center;gap:7px;padding:6px 0;flex-wrap:wrap;}
.pri-group{display:flex;gap:4px;}
.pri-btn{padding:5px 10px;border-radius:10px;border:1.5px solid var(--border);
  font-size:12px;font-weight:700;cursor:pointer;background:var(--bg);
  color:var(--muted);font-family:inherit;transition:all .12s;letter-spacing:.02em;}
.pri-btn:active{transform:scale(.9);}
.pri-btn.sel-p1{background:var(--p1);color:#fff;border-color:var(--p1);}
.pri-btn.sel-p2{background:var(--p2);color:#fff;border-color:var(--p2);}
.pri-btn.sel-p3{background:var(--p3);color:#fff;border-color:var(--p3);}
.pri-btn.sel-p4{background:var(--p4);color:#fff;border-color:var(--p4);}
.meta-sep{width:1px;height:22px;background:var(--border);flex-shrink:0;}

/* Jira input in panel */
.jira-wrap{display:flex;align-items:center;border:1.5px solid var(--border);
  border-radius:10px;background:var(--bg);overflow:hidden;height:32px;}
.jira-pfx{padding:0 6px 0 10px;font-size:12px;font-weight:600;color:#0052CC;
  white-space:nowrap;background:var(--bg);}
.jira-num{border:none;outline:none;background:transparent;color:var(--text);
  font-family:inherit;font-size:13px;width:52px;padding:0 8px 0 0;}
.jira-num::placeholder{color:var(--muted);}
.jira-wrap:focus-within{border-color:var(--accent);}

/* Case input in panel */
.case-wrap{display:flex;align-items:center;border:1.5px solid var(--border);
  border-radius:10px;background:var(--bg);overflow:hidden;height:32px;}
.case-pfx{padding:0 6px 0 10px;font-size:12px;font-weight:600;color:#6D28D9;
  white-space:nowrap;background:var(--bg);}
.case-num{border:none;outline:none;background:transparent;color:var(--text);
  font-family:inherit;font-size:13px;width:58px;padding:0 8px 0 0;}
.case-num::placeholder{color:var(--muted);}
.case-wrap:focus-within{border-color:var(--accent);}

/* Date button */
.date-btn{display:flex;align-items:center;gap:5px;padding:5px 12px;border-radius:10px;
  border:1.5px solid var(--border);background:var(--bg);font-size:13px;color:var(--muted);
  cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap;}
.date-btn.has-date{border-color:var(--accent);color:var(--accent);}
.date-x{background:none;border:none;color:var(--muted);font-size:14px;cursor:pointer;padding:2px 4px;line-height:1;}

.input-row{display:flex;gap:7px;align-items:center;}
.ti{flex:1;border:1.5px solid var(--border);border-radius:12px;padding:11px 13px;
  font-size:15px;background:var(--bg);color:var(--text);outline:none;font-family:inherit;transition:border-color .15s;}
.ti:focus{border-color:var(--accent);}
.ti::placeholder{color:var(--muted);}
.fab{width:44px;height:44px;border-radius:50%;border:none;display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:20px;flex-shrink:0;transition:transform .12s;}
.fab:active{transform:scale(.88);}
.mic{background:var(--bg);border:1.5px solid var(--border);color:var(--muted);}
.mic.on{background:var(--rec);border-color:var(--rec);color:#fff;animation:tpulse .8s infinite;}
.plus{color:#fff;}
.panel-foot{display:flex;align-items:center;justify-content:space-between;padding-top:5px;}
.foot-btn{background:none;border:none;font-family:inherit;font-size:13px;cursor:pointer;
  color:var(--muted);display:flex;align-items:center;gap:4px;}

/* Modals */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);
  z-index:100;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.sheet{background:var(--card);border-radius:20px 20px 0 0;padding:1.5rem 1.25rem;
  width:100%;max-width:960px;max-height:90vh;overflow-y:auto;}
.sheet h2{font-size:18px;font-weight:700;margin-bottom:1rem;}
.sheet h3{font-size:14px;font-weight:600;color:var(--muted);text-transform:uppercase;
  letter-spacing:.04em;margin:1rem 0 .6rem;}
.m-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;
  font-size:15px;background:var(--bg);color:var(--text);font-family:inherit;outline:none;margin-bottom:10px;}
.m-input:focus{border-color:var(--accent);}
.m-btn{width:100%;padding:13px;border-radius:12px;border:none;font-size:15px;font-weight:600;
  cursor:pointer;font-family:inherit;margin-bottom:8px;}
.m-btn.primary{background:var(--accent);color:#fff;}
.m-btn.secondary{background:var(--bg);color:var(--text);}
.m-btn.danger{background:var(--bg);color:#ff3b30;}

/* Calendar */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.cal-nav-btn{width:38px;height:38px;border-radius:50%;border:none;background:var(--bg);
  color:var(--text);font-size:22px;cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:background .1s;}
.cal-nav-btn:hover{background:var(--card2);}
.cal-month-lbl{font-size:17px;font-weight:700;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:1rem;}
.cal-dow{text-align:center;font-size:11px;font-weight:600;color:var(--muted);padding:5px 0;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;
  border-radius:50%;font-size:15px;cursor:pointer;border:2px solid transparent;
  transition:all .12s;position:relative;}
.cal-day:hover{background:var(--card2);}
.cal-day.today{border-color:var(--accent);font-weight:700;color:var(--accent);}
.cal-day.selected{background:var(--accent)!important;color:#fff!important;border-color:var(--accent)!important;font-weight:700;}
.cal-day.past-day{opacity:.38;}
.cal-day.empty{cursor:default;}
.cal-today-dot{position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--accent);}
.cal-day.selected .cal-today-dot{background:rgba(255,255,255,.7);}

/* Category management */
.cat-list{display:flex;flex-direction:column;gap:7px;margin-bottom:1.25rem;}
.cat-li{display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:10px;padding:10px 12px;}
.cat-li-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;}
.cat-li-name{flex:1;font-size:14px;font-weight:500;}
.cat-li-count{font-size:12px;color:var(--muted);}
.cat-li-del{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:4px;}
.cat-li-del:hover{color:#ff3b30;}
.swatches{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.swatch{width:30px;height:30px;border-radius:50%;cursor:pointer;border:3px solid transparent;transition:transform .1s;}
.swatch.sel{border-color:var(--text);transform:scale(1.18);}

/* Time log modal — editable sessions */
.sessions-list{display:flex;flex-direction:column;gap:7px;margin-bottom:.75rem;max-height:300px;overflow-y:auto;}
.sess-edit-row{display:flex;align-items:center;gap:6px;background:var(--bg);border-radius:10px;padding:8px 10px;}
.sess-edit-row input[type=date]{flex:1;min-width:0;}
.sess-hm{width:46px;text-align:center;}
.mini-input{border:1.5px solid var(--border);border-radius:8px;padding:7px 9px;
  font-size:13px;background:var(--card);color:var(--text);font-family:inherit;outline:none;}
.mini-input:focus{border-color:var(--accent);}
.sess-del{background:none;border:none;color:var(--muted);font-size:15px;cursor:pointer;padding:2px 4px;}
.sess-del:hover{color:#ff3b30;}
.log-hint{font-size:12px;color:var(--muted);margin-bottom:.75rem;}

/* Daily report */
.rep-controls{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.rep-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:1rem;}
.rep-table th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;
  color:var(--muted);padding:6px 8px;border-bottom:1px solid var(--border);}
.rep-table td{padding:8px;border-bottom:1px solid var(--border);vertical-align:top;}
.rep-table td.num{text-align:right;font-variant-numeric:tabular-nums;white-space:nowrap;}
.rep-ref{font-family:ui-monospace,Menlo,monospace;font-weight:600;}
.rep-dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:6px;vertical-align:middle;}
.rep-sec{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  color:var(--muted);margin:1.2rem 0 .5rem;}
.rep-grand{font-size:15px;font-weight:700;text-align:right;padding:8px;}
.rep-empty{text-align:center;color:var(--muted);padding:2rem 0;}

/* Settings label */
.settings-label{font-size:13px;color:var(--muted);margin-bottom:5px;display:block;}

/* Login overlay */
.login-overlay{position:fixed;inset:0;z-index:300;overflow:hidden;
  display:flex;align-items:center;justify-content:center;padding:1.5rem;
  background:radial-gradient(circle at 50% 38%, #3c3c3e 0%, #2c2c2e 58%, #242426 100%);}
.login-overlay.hidden{display:none;}
.login-bg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
.login-card{position:relative;z-index:1;width:100%;max-width:380px;
  background:rgba(40,40,42,0.55);backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);
  border:1px solid rgba(255,255,255,0.12);border-radius:18px;
  box-shadow:0 24px 60px rgba(0,0,0,0.45);padding:2rem 1.75rem;}
.login-card h2{font-size:30px;letter-spacing:-.5px;margin-bottom:.15rem;color:#fff;}
.login-card h2 .lite{font-weight:300;}
.login-card h2 .bold{font-weight:800;}
.login-card p{font-size:14px;color:rgba(255,255,255,0.55);margin-bottom:1.35rem;}
.login-card .m-input{background:#f4f4f5;color:#1c1c1e;border:1.5px solid transparent;
  border-radius:12px;margin-bottom:12px;}
.login-card .m-input::placeholder{color:#9a9a9e;}
.login-card .m-input:focus{background:#fff;border-color:#fff;}
.login-btn{background:transparent;border:1.5px solid rgba(255,255,255,0.5);color:#fff;
  transition:all .15s;}
.login-btn:hover{background:rgba(255,255,255,0.08);border-color:#fff;}
.login-err{color:#ff6b6b;font-size:13px;min-height:18px;margin:2px 0 10px;}

/* Responsive */
@media(min-width:600px){
  .hdr h1{font-size:30px;}
  .tab{font-size:14px;padding:8px 18px;}
  .task-lbl{font-size:16px;}
  .gt-name{max-width:180px;}
}
@media(min-width:1024px){
  .hdr h1{font-size:32px;}
  .tasks{padding:0 1.25rem;}
}
</style>
</head>
<body>

<!-- Login overlay -->
<div class="login-overlay" id="loginOverlay">
  <svg class="login-bg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="ndots" width="24" height="24" patternUnits="userSpaceOnUse">
        <circle cx="2.5" cy="2.5" r="2.2" fill="#ffffff" fill-opacity="0.16"/>
      </pattern>
    </defs>
    <text x="800" y="300" text-anchor="middle" font-family="-apple-system,'Segoe UI',Roboto,sans-serif" font-size="230" fill="#ffffff" fill-opacity="0.05"><tspan font-weight="300">nilus</tspan><tspan font-weight="800">DO</tspan></text>

<script>
// ── Defaults & constants ──────────────────────────────────────────────────────
const DEFAULTS = [
  {id:'aws',label:'AWS Server',color:'#378ADD',order:0,
   presets:['Check server health','Review CloudWatch alerts','Check billing','Update security groups','Verify backups','Review EC2 usage','Check S3 buckets','Update IAM permissions']},
  {id:'eps',label:'ePS CC Server',color:'#7F77DD',order:1,
   presets:['Check server status','Review error logs','Restart services','Update config','Monitor performance','Check disk space','Clear cache','Review DB connections']},
  {id:'regression',label:'Regression',color:'#1D9E75',order:2,
   presets:['Run regression suite','Review test results','Log failed tests','Update test cases','Sign off release','Compare test runs','Re-run flaky tests','Smoke test deploy']},
  {id:'meetings',label:'Meetings',color:'#D85A30',order:3,
   presets:['Prepare agenda','Send invite','Take notes','Send follow-up','Update action items','Book room','Share recording']},
  {id:'calls',label:'Calls',color:'#BA7517',order:4,
   presets:['Prepare talking points','Log call notes','Send follow-up email','Schedule next call','Update contact info']},
  {id:'integrations',label:'Integrations',color:'#D4537E',order:5,
   presets:['Test API endpoint','Check integration logs','Update API keys','Document changes','Verify webhook','Review error rate','Check rate limits']},
];
const COLORS=['#378ADD','#7F77DD','#1D9E75','#D85A30','#BA7517','#D4537E','#0EA5E9','#8B5CF6','#10B981','#F59E0B','#EF4444','#636366'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];

// ── State ─────────────────────────────────────────────────────────────────────
let activeTab='all', cats=[], tasks={};
let presetsOpen=false, recog=null, db=null, auth=null;
let selPri=null, addDate=null;
let calMode='add', calYear, calMonth;
let selColor=COLORS[0];
let timerInterval=null;
let settings={ jiraPrefix:'CTI-', jiraBaseUrl:'', casePrefix:'Case-', caseBaseUrl:'' };

// ── Firebase ──────────────────────────────────────────────────────────────────
function initFirebase() {
  try {
    firebase.initializeApp(FIREBASE_CONFIG);
    db=firebase.database();
    auth=firebase.auth();
    db.ref('.info/connected').on('value',s=>setSyncBadge(s.val()?'online':'offline'));
    auth.onAuthStateChanged(user=>{ user ? onSignedIn() : onSignedOut(); });
  } catch(e){
    console.error(e); setSyncBadge('error');
    // Offline / init failure: allow local-only access on this device
    document.getElementById('loginOverlay').classList.add('hidden');
    cats=DEFAULTS; loadLocal(); applySettings(); checkTimer(); render();
  }
}

// ── Auth ──────────────────────────────────────────────────────────────────────
let listenersAttached=false;
function onSignedIn(){
  document.getElementById('loginOverlay').classList.add('hidden');
  const err=document.getElementById('loginErr'); if(err)err.textContent='';
  const pass=document.getElementById('loginPass'); if(pass)pass.value='';
  if(!listenersAttached){ attachDataListeners(); listenersAttached=true; }
}
function onSignedOut(){
  document.getElementById('loginOverlay').classList.remove('hidden');
}
function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value;
  const err=document.getElementById('loginErr');
  err.textContent='';
  if(!email||!pass){ err.textContent='Enter email and password.'; return; }
  if(!auth){ err.textContent='Auth not ready — check your connection.'; return; }
  auth.signInWithEmailAndPassword(email,pass)
    .catch(e=>{ err.textContent = (e&&e.code) ? loginErrMsg(e.code) : 'Sign-in failed.'; });
}
function loginErrMsg(code){
  if(code.includes('wrong-password')||code.includes('invalid-credential'))return 'Wrong email or password.';
  if(code.includes('user-not-found'))return 'No account with that email.';
  if(code.includes('too-many-requests'))return 'Too many attempts — try again later.';
  if(code.includes('invalid-email'))return 'That email looks invalid.';
  if(code.includes('network'))return 'Network error — check your connection.';
  return 'Sign-in failed ('+code+').';
}
function signOut(){
  if(auth) auth.signOut().then(()=>location.reload()).catch(()=>location.reload());
  else location.reload();
}

function attachDataListeners(){
  db.ref('settings').on('value', snap=>{
    const v=snap.val();
    if(v){ settings={...settings,...v}; applySettings(); }
  });
  db.ref('categories').on('value',snap=>{
    const v=snap.val();
    if(v&&Object.keys(v).length){
      cats=Object.values(v).sort((a,b)=>(a.order||0)-(b.order||0));
    } else {
      cats=DEFAULTS.map((c,i)=>({...c,order:i}));
      db.ref('categories').set(Object.fromEntries(cats.map(c=>[c.id,c])));
    }
    cats.forEach(c=>{if(!tasks[c.id])tasks[c.id]=[];});
    render();
  });
  db.ref('tasks').on('value',snap=>{
    const v=snap.val()||{};
    cats.forEach(c=>{tasks[c.id]=v[c.id]?Object.values(v[c.id]):[];});
    Object.keys(v).forEach(k=>{if(!tasks[k])tasks[k]=Object.values(v[k]);});
    normalizeSessions();
    checkTimer();
    render();
  });
}

// Firebase may return session arrays as objects — restore them to arrays
function normalizeSessions(){
  Object.keys(tasks).forEach(k=>(tasks[k]||[]).forEach(t=>{
    if(t.sessions) t.sessions=Object.values(t.sessions);
  }));
}

function saveTasks(){
  if(!db){saveLocal();return;}
  const data={};
  cats.forEach(c=>{data[c.id]={};(tasks[c.id]||[]).forEach(t=>{data[c.id][t.id]=t;});});
  db.ref('tasks').set(data).catch(saveLocal);
}
function saveCats(){
  if(!db){saveLocal();return;}
  db.ref('categories').set(Object.fromEntries(cats.map((c,i)=>[c.id,{...c,order:i}])));
}
function saveSettingsRemote(){
  if(!db){saveLocal();return;}
  db.ref('settings').set(settings);
}
function saveLocal(){
  localStorage.setItem('tc_cats',JSON.stringify(cats));
  localStorage.setItem('tc_tasks',JSON.stringify(tasks));
  localStorage.setItem('tc_settings',JSON.stringify(settings));
}
function loadLocal(){
  try{cats=JSON.parse(localStorage.getItem('tc_cats'))||DEFAULTS;}catch{cats=DEFAULTS;}
  try{tasks=JSON.parse(localStorage.getItem('tc_tasks'))||{};}catch{tasks={};}
  try{const s=JSON.parse(localStorage.getItem('tc_settings'));if(s)settings={...settings,...s};}catch{}
  cats.forEach(c=>{if(!tasks[c.id])tasks[c.id]=[];});
  normalizeSessions();
}
function setSyncBadge(s){
  const b=document.getElementById('syncBadge');
  b.className='sync-badge '+s;
  b.textContent=s==='online'?'● Live sync':s==='offline'?'⏺ Offline':'⚠ Error';
}
function applySettings(){
  document.getElementById('jiraPfxLbl').textContent=settings.jiraPrefix||'CTI-';
  const pfx=document.getElementById('jiraPrefixSetting');
  if(pfx&&pfx.value!==settings.jiraPrefix)pfx.value=settings.jiraPrefix||'CTI-';
  const url=document.getElementById('jiraUrlSetting');
  if(url&&url.value!==settings.jiraBaseUrl)url.value=settings.jiraBaseUrl||'';
  document.getElementById('casePfxLbl').textContent=settings.casePrefix||'Case-';
  const cp=document.getElementById('casePrefixSetting');
  if(cp&&cp.value!==settings.casePrefix)cp.value=settings.casePrefix||'Case-';
  const cu=document.getElementById('caseUrlSetting');
  if(cu&&cu.value!==settings.caseBaseUrl)cu.value=settings.caseBaseUrl||'';
}
function updateJiraPrefix(){
  settings.jiraPrefix=document.getElementById('jiraPrefixSetting').value;
  document.getElementById('jiraPfxLbl').textContent=settings.jiraPrefix;
  saveSettingsRemote();
}
function updateCasePrefix(){
  settings.casePrefix=document.getElementById('casePrefixSetting').value;
  document.getElementById('casePfxLbl').textContent=settings.casePrefix;
  saveSettingsRemote();
}
function saveSettings(){
  settings.jiraBaseUrl=document.getElementById('jiraUrlSetting').value;
  settings.caseBaseUrl=document.getElementById('caseUrlSetting').value;
  saveSettingsRemote();
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  renderTabs(); renderSecTitle();
  activeTab==='all'?renderAll():renderCat();
  renderPresets(); updatePlusColor();
  document.getElementById('todayLbl').textContent=
    new Date().toLocaleDateString('en',{weekday:'short',month:'short',day:'numeric'});
}

function renderTabs(){
  const allN=cats.reduce((n,c)=>n+(tasks[c.id]||[]).filter(t=>!t.done).length,0);
  let html=tabBtn('all','All','#555',allN);
  cats.forEach(c=>html+=tabBtn(c.id,c.label,c.color,(tasks[c.id]||[]).filter(t=>!t.done).length));
  document.getElementById('tabs').innerHTML=html;
}
function tabBtn(id,label,color,n){
  const act=id===activeTab;
  const badge=n>0?`<span class="tab-count">${n}</span>`:'';
  return `<button class="tab ${act?'active':''}"
    style="${act?'background:'+color+';border-color:'+color:''}"
    onclick="switchTab('${id}')">${esc(label)}${badge}</button>`;
}
function renderSecTitle(){
  let label,left;
  if(activeTab==='all'){
    const total=cats.reduce((n,c)=>n+(tasks[c.id]||[]).length,0);
    const done=cats.reduce((n,c)=>n+(tasks[c.id]||[]).filter(t=>t.done).length,0);
    label='All tasks';left=total?` · ${total-done} open`:'';
  } else {
    const cat=getCat();if(!cat)return;
    const list=tasks[activeTab]||[],done=list.filter(t=>t.done).length;
    label=cat.label;left=list.length?` · ${list.length-done} open`:'';
  }
  document.getElementById('secTitle').textContent=label+left;
}
function renderAll(){
  const el=document.getElementById('taskList');
  const total=cats.reduce((n,c)=>n+(tasks[c.id]||[]).length,0);
  if(!total){el.innerHTML=`<div class="empty"><div class="empty-icon">🗂️</div><div class="empty-msg">Nothing yet.<br>Pick a category tab and add your first task.</div></div>`;return;}
  let html='';
  cats.forEach(c=>{
    const list=tasks[c.id]||[];if(!list.length)return;
    const open=list.filter(t=>!t.done).length;
    html+=`<div class="cat-group">
      <div class="cat-group-hdr"><div class="cat-dot" style="background:${c.color}"></div>
      <span class="cat-group-label">${esc(c.label)}</span>
      <span class="cat-group-count">${open} open</span></div>
      <div class="cat-group-tasks">${list.map((t,i)=>taskHtml(t,i,c)).join('')}</div>
    </div>`;
  });
  el.innerHTML=html;
}
function renderCat(){
  const el=document.getElementById('taskList');
  const cat=getCat();if(!cat)return;
  const list=tasks[activeTab]||[];
  if(!list.length){el.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-msg">No tasks yet —<br>type below or tap Quick presets</div></div>`;return;}
  el.innerHTML=list.map((t,i)=>taskHtml(t,i,cat)).join('');
}

function taskHtml(t,i,cat){
  const activeSession=t.sessions&&t.sessions.find(s=>!s.end);
  const isRec=!!activeSession;
  const priTag=t.priority?`<span class="pri-tag p${t.priority}">P${t.priority}</span>`:'';
  const jiraTag=t.jiraNumber?buildJiraTag(t.jiraNumber):'';
  const caseTag=t.caseNumber?buildCaseTag(t.caseNumber):'';
  const due=dueBadge(t,i,cat.id);
  const created=fmtCreated(t.createdAt);
  const totalMs=getTotalMs(t);
  const sessCount=(t.sessions||[]).length;

  const elapsedHtml=isRec
    ?`<span class="timer-elapsed" id="el-${t.id}">${fmtElapsed(Date.now()-activeSession.start)}</span>`:'';
  const totalHtml=totalMs>0
    ?`<span class="timer-total">⏱ ${fmtDuration(totalMs)} · <span style="cursor:pointer;text-decoration:underline" onclick="openTimeLog('${cat.id}',${i})">${sessCount} session${sessCount!==1?'s':''}</span></span>`:'';
  const timerRow=(elapsedHtml||totalHtml)?`<div class="timer-row">${elapsedHtml}${totalHtml}</div>`:'';

  return `<div class="task ${t.done?'done':''} ${isRec?'rec-active':''}" id="task-${t.id}">
    <div class="check" onclick="toggle('${cat.id}',${i})"
      style="${t.done?'background:'+cat.color+';border-color:'+cat.color:'border-color:'+cat.color+'88'}">${t.done?'✓':''}</div>
    <div class="task-body">
      <div class="task-lbl">${esc(t.text)}</div>
      <div class="task-meta">${priTag}${jiraTag}${caseTag}<span class="created-lbl">📝 ${created}</span>${due}</div>
      ${timerRow}
    </div>
    <div class="task-actions">
      <button class="t-btn ${isRec?'on':''}" onclick="toggleTimer('${cat.id}',${i})" title="${isRec?'Stop':'Start'} timer">${isRec?'■':'▶'}</button>
      <button class="del" onclick="del('${cat.id}',${i})">✕</button>
    </div>
  </div>`;
}

function buildJiraTag(num){
  const pfx=settings.jiraPrefix||'CTI-';
  const ticket=pfx+num;
  const base=settings.jiraBaseUrl||'';
  if(base){
    return `<a class="jira-tag linked" href="${esc(base+ticket)}" target="_blank" rel="noopener">${esc(ticket)}</a>`;
  }
  return `<span class="jira-tag">${esc(ticket)}</span>`;
}
function buildCaseTag(num){
  const pfx=settings.casePrefix||'Case-';
  const ticket=pfx+num;
  const base=settings.caseBaseUrl||'';
  if(base){
    return `<a class="case-tag linked" href="${esc(base+ticket)}" target="_blank" rel="noopener">${esc(ticket)}</a>`;
  }
  return `<span class="case-tag">${esc(ticket)}</span>`;
}

function dueBadge(t,i,catId){
  if(!t.dueDate)return `<span class="due-tag due-add" onclick="openCalEdit('${catId}',${i})">+ due date</span>`;
  const today=new Date();today.setHours(0,0,0,0);
  const due=new Date(t.dueDate+'T00:00:00');
  const diff=Math.round((due-today)/86400000);
  let cls,lbl;
  if(diff<0){cls='due-overdue';lbl=`⚠ Overdue · ${fmtDate(t.dueDate)}`;}
  else if(diff===0){cls='due-today';lbl='Today';}
  else if(diff===1){cls='due-tomorrow';lbl='Tomorrow';}
  else if(diff<=7){cls='due-soon';lbl=`${diff}d · ${fmtDate(t.dueDate)}`;}
  else{cls='due-future';lbl=fmtDate(t.dueDate);}
  return `<span class="due-tag ${cls}" onclick="openCalEdit('${catId}',${i})">📅 ${lbl}</span>`;
}

function renderPresets(){
  const cat=activeTab==='all'?null:getCat();
  document.getElementById('presetsScroll').innerHTML=cat
    ?(cat.presets||[]).map(p=>`<button class="chip" onclick="addTask(${JSON.stringify(p)})">${esc(p)}</button>`).join(''):'';
}
function updatePlusColor(){
  const cat=activeTab==='all'?null:getCat();
  document.getElementById('plusBtn').style.background=cat?cat.color:'#555';
}

// ── Timer ─────────────────────────────────────────────────────────────────────
function findActiveSession(){
  for(const c of cats){
    const list=tasks[c.id]||[];
    for(let i=0;i<list.length;i++){
      const t=list[i];
      if(t.sessions&&t.sessions.some(s=>!s.end)) return {catId:c.id,i,task:t};
    }
  }
  return null;
}

function toggleTimer(catId,i){
  const t=tasks[catId][i];
  const active=t.sessions&&t.sessions.some(s=>!s.end);
  if(active){
    t.sessions=t.sessions.map(s=>s.end?s:{...s,end:Date.now()});
  } else {
    const cur=findActiveSession();
    if(cur){
      tasks[cur.catId][cur.i].sessions=tasks[cur.catId][cur.i].sessions.map(s=>s.end?s:{...s,end:Date.now()});
    }
    if(!t.sessions)t.sessions=[];
    t.sessions.push({start:Date.now(),end:null});
  }
  saveTasks(); checkTimer(); render();
}

function checkTimer(){
  const active=findActiveSession();
  if(active&&!timerInterval){
    timerInterval=setInterval(tick,1000);
  } else if(!active&&timerInterval){
    clearInterval(timerInterval); timerInterval=null;
  }
  updateGlobalBadge();
}

function tick(){
  const active=findActiveSession();
  if(!active){clearInterval(timerInterval);timerInterval=null;updateGlobalBadge();return;}
  const s=active.task.sessions.find(s=>!s.end);
  if(!s)return;
  const elapsed=Date.now()-s.start;
  const el=document.getElementById('el-'+active.task.id);
  if(el)el.textContent=fmtElapsed(elapsed);
  updateGlobalBadge();
}

function updateGlobalBadge(){
  const badge=document.getElementById('globalTimer');
  const active=findActiveSession();
  if(!active){badge.style.display='none';return;}
  const s=active.task.sessions.find(s=>!s.end);
  const elapsed=s?Date.now()-s.start:0;
  document.getElementById('gtTime').textContent=fmtElapsed(elapsed);
  document.getElementById('gtName').textContent=active.task.text;
  badge.style.display='flex';
}

function goToActiveTask(){
  const active=findActiveSession();
  if(!active)return;
  switchTab(active.catId);
  setTimeout(()=>{
    const el=document.getElementById('task-'+active.task.id);
    if(el)el.scrollIntoView({behavior:'smooth',block:'center'});
  },120);
}

// ── Time log modal (editable) ─────────────────────────────────────────────────
let logCatId=null,logIdx=null;
function openTimeLog(catId,i){
  logCatId=catId;logIdx=i;
  const t=tasks[catId][i];
  document.getElementById('timeLogTask').textContent=t.text;
  renderSessionEditor(t.sessions||[]);
  document.getElementById('timeLogModal').classList.add('open');
}
function closeTimeLog(){
  document.getElementById('timeLogModal').classList.remove('open');
  logCatId=null;logIdx=null;
}
function sessionRowHtml(s){
  const dur=(s.end||Date.now())-s.start;
  const h=Math.floor(dur/3600000), m=Math.floor((dur%3600000)/60000);
  const live=!s.end?'<span style="font-size:11px;color:var(--rec);font-weight:600;">● live</span>':'';
  return `<div class="sess-edit-row" data-orig="${s.start}">
    <input type="date" class="mini-input" data-f="date" value="${dateStr(new Date(s.start))}">
    <input class="mini-input sess-hm" data-f="h" type="number" min="0" value="${h}">
    <span style="color:var(--muted);font-size:12px;">h</span>
    <input class="mini-input sess-hm" data-f="m" type="number" min="0" max="59" value="${m}">
    <span style="color:var(--muted);font-size:12px;">m</span>
    ${live}
    <button class="sess-del" onclick="this.closest('.sess-edit-row').remove();updateLogTotal()">🗑</button>
  </div>`;
}
function renderSessionEditor(sessions){
  const el=document.getElementById('sessionsList');
  el.innerHTML=sessions.length
    ? sessions.map(sessionRowHtml).join('')
    : '<div style="color:var(--muted);font-size:14px;">No sessions yet — add one below.</div>';
  el.querySelectorAll('input').forEach(inp=>inp.addEventListener('input',updateLogTotal));
  updateLogTotal();
}
function addManualSession(){
  const el=document.getElementById('sessionsList');
  if(!el.querySelector('.sess-edit-row'))el.innerHTML='';
  const div=document.createElement('div');
  div.className='sess-edit-row';
  div.innerHTML=`
    <input type="date" class="mini-input" data-f="date" value="${dateStr(new Date())}">
    <input class="mini-input sess-hm" data-f="h" type="number" min="0" value="0">
    <span style="color:var(--muted);font-size:12px;">h</span>
    <input class="mini-input sess-hm" data-f="m" type="number" min="0" max="59" value="0">
    <span style="color:var(--muted);font-size:12px;">m</span>
    <button class="sess-del" onclick="this.closest('.sess-edit-row').remove();updateLogTotal()">🗑</button>`;
  el.appendChild(div);
  div.querySelectorAll('input').forEach(inp=>inp.addEventListener('input',updateLogTotal));
  updateLogTotal();
}
function collectSessions(){
  return [...document.querySelectorAll('#sessionsList .sess-edit-row')].map(row=>{
    const date=row.querySelector('[data-f="date"]').value||dateStr(new Date());
    const h=parseInt(row.querySelector('[data-f="h"]').value)||0;
    const m=parseInt(row.querySelector('[data-f="m"]').value)||0;
    const durMs=(h*3600+m*60)*1000;
    const orig=row.dataset.orig?+row.dataset.orig:null;
    let start;
    if(orig){
      const od=new Date(orig), nd=new Date(date+'T00:00:00');
      start=new Date(nd.getFullYear(),nd.getMonth(),nd.getDate(),od.getHours(),od.getMinutes(),od.getSeconds()).getTime();
    } else {
      start=new Date(date+'T09:00:00').getTime();
    }
    return {start,end:start+durMs,durMs};
  }).filter(s=>s.durMs>0).map(s=>({start:s.start,end:s.end}));
}
function updateLogTotal(){
  const total=collectSessions().reduce((n,s)=>n+(s.end-s.start),0);
  document.getElementById('timeLogTotal').textContent='Total: '+fmtDuration(total);
}
function saveTimeLog(){
  if(logCatId===null)return;
  tasks[logCatId][logIdx].sessions=collectSessions();
  saveTasks(); closeTimeLog(); checkTimer(); render();
}

// ── Daily report (for Tempo) ──────────────────────────────────────────────────
function openReport(){
  document.getElementById('repDate').value=dateStr(new Date());
  renderReport();
  document.getElementById('reportModal').classList.add('open');
}
function closeReport(){document.getElementById('reportModal').classList.remove('open');}

function reportRows(day){
  const rows=[];
  cats.forEach(c=>(tasks[c.id]||[]).forEach(t=>{
    let ms=0;
    (t.sessions||[]).forEach(s=>{ if(dateStr(new Date(s.start))===day) ms+=(s.end||Date.now())-s.start; });
    if(ms>0){
      const jira=t.jiraNumber?((settings.jiraPrefix||'CTI-')+t.jiraNumber):'';
      const cas=t.caseNumber?((settings.casePrefix||'Case-')+t.caseNumber):'';
      rows.push({cat:c.label,color:c.color,jira,cas,text:t.text,ms});
    }
  }));
  return rows;
}
function renderReport(){
  const day=document.getElementById('repDate').value||dateStr(new Date());
  const rows=reportRows(day);
  const el=document.getElementById('repBody');
  if(!rows.length){el.innerHTML='<div class="rep-empty">No time logged on this day.</div>';return;}

  const byRef={};
  rows.forEach(r=>{ const k=r.jira||r.cas||'(no ticket)'; byRef[k]=(byRef[k]||0)+r.ms; });
  const total=rows.reduce((n,r)=>n+r.ms,0);

  let html='<div class="rep-sec">By ticket → for Tempo</div>'
    +'<table class="rep-table"><thead><tr><th>Ticket</th><th style="text-align:right">Hours</th><th style="text-align:right">H:MM</th></tr></thead><tbody>';
  Object.keys(byRef).sort().forEach(k=>{
    html+=`<tr><td class="rep-ref">${esc(k)}</td><td class="num">${decHours(byRef[k])}</td><td class="num">${fmtDuration(byRef[k])}</td></tr>`;
  });
  html+='</tbody></table>';

  html+='<div class="rep-sec">Task detail</div>'
    +'<table class="rep-table"><thead><tr><th>Task</th><th style="text-align:right">Hours</th><th style="text-align:right">H:MM</th></tr></thead><tbody>';
  rows.forEach(r=>{
    const ref=(r.jira||r.cas)?`<span class="rep-ref">${esc(r.jira||r.cas)}</span> `:'';
    html+=`<tr><td><span class="rep-dot" style="background:${r.color}"></span>${ref}${esc(r.text)}
      <span style="color:var(--muted);font-size:11px;">· ${esc(r.cat)}</span></td>
      <td class="num">${decHours(r.ms)}</td><td class="num">${fmtDuration(r.ms)}</td></tr>`;
  });
  html+=`</tbody></table><div class="rep-grand">Day total: ${decHours(total)}h · ${fmtDuration(total)}</div>`;
  el.innerHTML=html;
}
function copyReport(){
  const day=document.getElementById('repDate').value||dateStr(new Date());
  const rows=reportRows(day);
  if(!rows.length){alert('Nothing to copy for this day.');return;}
  const byRef={};
  rows.forEach(r=>{const k=r.jira||r.cas||'(no ticket)';byRef[k]=(byRef[k]||0)+r.ms;});
  let out=`Time log — ${day}\n\nBy ticket (for Tempo):\n`;
  Object.keys(byRef).sort().forEach(k=>{out+=`${k}\t${decHours(byRef[k])}h\t${fmtDuration(byRef[k])}\n`;});
  out+=`\nTask detail:\n`;
  rows.forEach(r=>{const ref=(r.jira||r.cas)?(r.jira||r.cas)+' ':'';out+=`${ref}${r.text}\t${decHours(r.ms)}h\t${fmtDuration(r.ms)}\t[${r.cat}]\n`;});
  const total=rows.reduce((n,r)=>n+r.ms,0);
  out+=`\nDay total\t${decHours(total)}h\t${fmtDuration(total)}\n`;
  (navigator.clipboard?navigator.clipboard.writeText(out):Promise.reject())
    .then(()=>alert('Copied! Paste into Tempo or a spreadsheet.'))
    .catch(()=>prompt('Copy the report below:',out));
}

// ── Actions ───────────────────────────────────────────────────────────────────
function switchTab(id){
  activeTab=id;presetsOpen=false;
  document.getElementById('presetsWrap').classList.remove('open');
  document.getElementById('presetArr').textContent='▸';
  const ti=document.getElementById('ti');
  ti.placeholder=id==='all'?'Select a category tab to add tasks':'Add to '+getCat().label+'...';
  render();
}

function addTask(text){
  if(activeTab==='all'){alert('Pick a category tab first.');return;}
  const ti=document.getElementById('ti');
  const val=(text!==undefined?text:ti.value).trim();
  if(!val){ti.focus();return;}
  const jn=document.getElementById('jiraInput').value.trim();
  const cn=document.getElementById('caseInput').value.trim();
  const t={id:'t'+Date.now(),text:val,done:false,createdAt:Date.now()};
  if(addDate)t.dueDate=addDate;
  if(selPri)t.priority=selPri;
  if(jn)t.jiraNumber=jn;
  if(cn)t.caseNumber=cn;
  if(!tasks[activeTab])tasks[activeTab]=[];
  tasks[activeTab].unshift(t);
  saveTasks();
  if(text===undefined){
    ti.value='';
    document.getElementById('jiraInput').value='';
    document.getElementById('caseInput').value='';
  }
  render();
}

function toggle(catId,i){tasks[catId][i].done=!tasks[catId][i].done;saveTasks();render();}
function del(catId,i){tasks[catId].splice(i,1);saveTasks();render();}
function clearDone(){
  if(activeTab==='all')cats.forEach(c=>{tasks[c.id]=(tasks[c.id]||[]).filter(t=>!t.done);});
  else tasks[activeTab]=(tasks[activeTab]||[]).filter(t=>!t.done);
  saveTasks();render();
}
function togglePresets(){
  if(activeTab==='all')return;
  presetsOpen=!presetsOpen;
  document.getElementById('presetsWrap').classList.toggle('open',presetsOpen);
  document.getElementById('presetArr').textContent=presetsOpen?'▾':'▸';
}
function setPri(p){
  selPri=(selPri===p)?null:p;
  [1,2,3,4].forEach(n=>{document.getElementById('priBtn'+n).className='pri-btn'+(selPri===n?' sel-p'+n:'');});
}

// ── Calendar ──────────────────────────────────────────────────────────────────
function openCalAdd(){
  calMode='add';
  const today=new Date();
  calYear=today.getFullYear();calMonth=today.getMonth();
  if(!addDate){
    const y=today.getFullYear(),m=String(today.getMonth()+1).padStart(2,'0'),d=String(today.getDate()).padStart(2,'0');
    addDate=`${y}-${m}-${d}`;updateDateBtn();
  } else {
    const p=addDate.split('-');calYear=+p[0];calMonth=+p[1]-1;
  }
  renderCalGrid();document.getElementById('calOverlay').classList.add('open');
}
function openCalEdit(catId,i){
  calMode={catId,i};
  const today=new Date();calYear=today.getFullYear();calMonth=today.getMonth();
  const t=tasks[catId][i];
  if(t.dueDate){const p=t.dueDate.split('-');calYear=+p[0];calMonth=+p[1]-1;}
  renderCalGrid();document.getElementById('calOverlay').classList.add('open');
}
function closeCal(){document.getElementById('calOverlay').classList.remove('open');}
function calNav(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++;}
  if(calMonth<0){calMonth=11;calYear--;}
  renderCalGrid();
}
function renderCalGrid(){
  document.getElementById('calMonthLbl').textContent=`${MONTHS[calMonth]} ${calYear}`;
  const today=new Date();today.setHours(0,0,0,0);
  const firstDow=new Date(calYear,calMonth,1).getDay();
  const days=new Date(calYear,calMonth+1,0).getDate();
  const offset=firstDow===0?6:firstDow-1;
  let curSel=calMode==='add'?addDate:(tasks[calMode.catId][calMode.i].dueDate||null);
  let html=['Mo','Tu','We','Th','Fr','Sa','Su'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<offset;i++)html+=`<div class="cal-day empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dd=new Date(calYear,calMonth,d);
    const isTod=+dd===+today,isSel=ds===curSel,isPast=dd<today&&!isTod;
    let cls='cal-day';
    if(isSel)cls+=' selected';else if(isTod)cls+=' today';
    if(isPast&&!isSel)cls+=' past-day';
    const dot=isTod&&!isSel?'<div class="cal-today-dot"></div>':'';
    html+=`<div class="${cls}" onclick="calPickDate('${ds}')">${d}${dot}</div>`;
  }
  document.getElementById('calGrid').innerHTML=html;
}
function calPickDate(ds){
  if(calMode==='add'){addDate=ds;updateDateBtn();}
  else{tasks[calMode.catId][calMode.i].dueDate=ds;saveTasks();render();}
  closeCal();
}
function setCalToday(){
  const t=new Date();
  calPickDate(`${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`);
}
function calClearDate(){
  if(calMode==='add'){addDate=null;updateDateBtn();}
  else{tasks[calMode.catId][calMode.i].dueDate=null;saveTasks();render();}
  closeCal();
}
function updateDateBtn(){
  const btn=document.getElementById('dateBtnEl'),x=document.getElementById('dateXBtn');
  if(!addDate){
    document.getElementById('dateBtnLbl').textContent='Add due date';
    btn.classList.remove('has-date');x.style.display='none';return;
  }
  const today=new Date();today.setHours(0,0,0,0);
  const due=new Date(addDate+'T00:00:00');
  const diff=Math.round((due-today)/86400000);
  const lbl=diff<0?`Overdue · ${fmtDate(addDate)}`:diff===0?'Today':diff===1?'Tomorrow':fmtDate(addDate);
  document.getElementById('dateBtnLbl').textContent=lbl;
  btn.classList.add('has-date');x.style.display='';
}
function clearAddDate(){addDate=null;updateDateBtn();}

// ── Category management ───────────────────────────────────────────────────────
function openMgmt(){
  renderCatList();renderSwatches();
  document.getElementById('newCatName').value='';selColor=COLORS[0];
  applySettings();
  document.getElementById('mgmtModal').classList.add('open');
}
function closeMgmt(){document.getElementById('mgmtModal').classList.remove('open');}
function renderCatList(){
  document.getElementById('catListEl').innerHTML=cats.map(c=>{
    const n=(tasks[c.id]||[]).length;
    return `<div class="cat-li">
      <div class="cat-li-dot" style="background:${c.color}"></div>
      <span class="cat-li-name">${esc(c.label)}</span>
      <span class="cat-li-count">${n} task${n!==1?'s':''}</span>
      <button class="cat-li-del" onclick="deleteCat('${c.id}')">✕</button>
    </div>`;
  }).join('');
}
function renderSwatches(){
  document.getElementById('swatchEl').innerHTML=COLORS.map(c=>
    `<div class="swatch ${c===selColor?'sel':''}" style="background:${c}" onclick="pickColor('${c}')"></div>`
  ).join('');
}
function pickColor(c){selColor=c;renderSwatches();}
function addCategory(){
  const name=document.getElementById('newCatName').value.trim();
  if(!name){alert('Enter a name.');return;}
  const id='cat_'+Date.now();
  cats.push({id,label:name,color:selColor,presets:[],order:cats.length});
  tasks[id]=[];saveCats();saveTasks();
  document.getElementById('newCatName').value='';renderCatList();renderSwatches();render();
}
function deleteCat(id){
  const cat=cats.find(c=>c.id===id),n=(tasks[id]||[]).length;
  if(!confirm(n?`Delete "${cat.label}"? It has ${n} tasks. All data will be lost.`:`Delete "${cat.label}"?`))return;
  cats=cats.filter(c=>c.id!==id);delete tasks[id];
  if(activeTab===id)activeTab='all';
  saveCats();saveTasks();renderCatList();render();
}

// ── Voice ─────────────────────────────────────────────────────────────────────
function toggleVoice(){
  if(activeTab==='all'){alert('Pick a category tab first.');return;}
  const btn=document.getElementById('mic');
  if(recog){recog.stop();recog=null;btn.classList.remove('on');return;}
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){alert('Voice works in Chrome and Safari.');return;}
  recog=new SR();recog.lang='en-US';recog.interimResults=false;
  recog.onresult=e=>{addTask(e.results[0][0].transcript);};
  recog.onend=()=>{btn.classList.remove('on');recog=null;};
  recog.onerror=()=>{btn.classList.remove('on');recog=null;};
  recog.start();btn.classList.add('on');
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function getCat(){return cats.find(c=>c.id===activeTab);}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(s){return new Date(s+'T00:00:00').toLocaleDateString('en',{month:'short',day:'numeric'});}
function dateStr(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function decHours(ms){return (ms/3600000).toFixed(2);}
function fmtCreated(ts){
  if(!ts)return 'today';
  const td=new Date();td.setHours(0,0,0,0);
  const yd=new Date(td);yd.setDate(td.getDate()-1);
  const dd=new Date(ts);dd.setHours(0,0,0,0);
  if(+dd===+td)return 'today';
  if(+dd===+yd)return 'yesterday';
  return new Date(ts).toLocaleDateString('en',{month:'short',day:'numeric'});
}
function fmtElapsed(ms){
  const s=Math.floor(ms/1000),h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h>0)return `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  return `${m}:${String(sec).padStart(2,'0')}`;
}
function fmtDuration(ms){
  const m=Math.floor(ms/60000),h=Math.floor(m/60),rm=m%60;
  if(h>0)return `${h}h ${rm}m`;
  return m>0?`${m}m`:'<1m';
}
function getTotalMs(t){
  return (t.sessions||[]).reduce((sum,s)=>sum+(s.end?s.end-s.start:Date.now()-s.start),0);
}

initFirebase();
switchTab('all');
